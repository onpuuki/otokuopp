name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'functions/campaign-scraper/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Create Pub/Sub Topic
        run: |
          gcloud pubsub topics create scrape-url-topic || true

      - name: Deploy Cloud Function (HTTP Trigger)
        run: |
          gcloud functions deploy startScraping \
            --gen2 \
            --runtime nodejs20 \
            --region asia-northeast1 \
            --source functions/campaign-scraper \
            --entry-point startScraping \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=120 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Deploy Cloud Function (Reset HTTP Trigger)
        run: |
          gcloud functions deploy resetScraping \
            --gen2 \
            --runtime nodejs20 \
            --region asia-northeast1 \
            --source functions/campaign-scraper \
            --entry-point resetScraping \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=120

      - name: Deploy Cloud Function (Pub/Sub Trigger)
        run: |
          gcloud functions deploy processUrlTask \
            --gen2 \
            --runtime nodejs20 \
            --region asia-northeast1 \
            --source functions/campaign-scraper \
            --entry-point processUrlTask \
            --trigger-topic=scrape-url-topic \
            --allow-unauthenticated \
            --timeout=120 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
